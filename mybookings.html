<!DOCTYPE html>
<html>
<head>
  <title>My Bookings</title>
  <link rel="stylesheet" href="mybookings.css">
</head>
<body>

<div class="mybookings-page">
  <h1>My Bookings</h1>

  <!-- Example booking card (you can duplicate for now) -->
  <div class="booking-card">
    <div class="row">
      <span class="tag">Bus</span>
      <span class="status confirmed">Confirmed</span>
    </div>

    <p><b>From:</b> Hyderabad</p>
    <p><b>To:</b> Bengaluru</p>
    <p><b>Date:</b> 2026-02-20</p>
    <p><b>Time:</b> 10:30 AM</p>
    <p><b>Seat:</b> S5</p>
    <p><b>Amount:</b> ₹999</p>

    <div class="actions">
      <a href="cancel.html" class="btn danger">Cancel</a>
      <a href="success.html" class="btn">View Ticket</a>
    </div>
  </div>

  <!-- Another example -->
  <div class="booking-card">
    <div class="row">
      <span class="tag">Train</span>
      <span class="status confirmed">Confirmed</span>
    </div>

    <p><b>From:</b> Mumbai</p>
    <p><b>To:</b> Pune</p>
    <p><b>Date:</b> 2026-02-22</p>
    <p><b>Time:</b> 07:00 AM</p>
    <p><b>Seat:</b> S2</p>
    <p><b>Amount:</b> ₹399</p>

    <div class="actions">
      <a href="cancel.html" class="btn danger">Cancel</a>
      <a href="success.html" class="btn">View Ticket</a>
    </div>
  </div>

</div>

</body>
</html>

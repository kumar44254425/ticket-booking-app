<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dash-bg">

  <h2 class="title">Select Your Service</h2>

  <div class="services-container">

    <div class="service-card">
      <img src="images/bus.png" alt="Bus">
      <h3>Bus Booking</h3>
      <a href="seat.html?service=bus" class="btn">Book Bus</a>
    </div>

    <div class="service-card">
      <img src="images/train.png" alt="Train">
      <h3>Train Booking</h3>
     <a href="seat.html?service=train" class="btn">Book Train</a>
    </div>

    <div class="service-card">
      <img src="images/flight.png" alt="Flight">
      <h3>Flight Booking</h3>
      <a href="seat.html?service=flight" class="btn">Book Flight</a>
    </div>

    <!-- New Cards -->
    <div class="service-card">
      <img src="images/booking.png" alt="My Bookings">
      <h3>My Bookings</h3>
      <a href="mybookings.html" class="btn">View Bookings</a>
    </div>

    <div class="service-card">
      <img src="images/cancel.png" alt="Cancel Booking">
      <h3>Cancel Booking</h3>
      <a href="cancel.html" class="btn">Cancel</a>
    </div>

    <div class="service-card">
      <img src="images/help.png" alt="Help Center">
      <h3>Help Center</h3>
      <a href="help.html" class="btn">Get Help</a>
    </div>

  </div>

</body>
</html>
